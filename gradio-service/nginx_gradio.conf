# Configuracion Nginx para la app Gradio (WaveSpeed Pro)
# Copiar a: /etc/nginx/sites-available/gradio
# Activar con: sudo ln -s /etc/nginx/sites-available/gradio /etc/nginx/sites-enabled/
# Recargar con: sudo nginx -s reload
#
# IMPORTANTE: Gradio usa WebSockets para la UI en tiempo real.
# Los headers Upgrade y Connection son obligatorios.

server {
    listen 80;
    server_name TU_DOMINIO_O_IP;   # <-- cambiar: ej. gradio.hechicer.ia o 1.2.3.4

    # Logs
    access_log /var/log/nginx/gradio_access.log;
    error_log  /var/log/nginx/gradio_error.log;

    # Tamano maximo de subidas (imagenes/videos)
    client_max_body_size 500M;

    # Timeout largo para generaciones de IA (pueden tardar minutos)
    proxy_read_timeout    600;
    proxy_connect_timeout 600;
    proxy_send_timeout    600;

    location / {
        proxy_pass http://127.0.0.1:7860;

        # WebSocket support (obligatorio para Gradio)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Deshabilitar buffering para streaming SSE de Gradio
        proxy_buffering off;
    }
}
